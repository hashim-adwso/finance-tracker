<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - ADWSO</title>
    <script src="https://unpkg.com/@azure/msal-browser@3/dist/msal-browser.min.js" defer></script>
    <style>
        body { font-family: 'Segoe UI'; padding: 40px; text-align: center; }
        button { padding: 20px 50px; font-size: 20px; }
    </style>
</head>
<body>
    <h1>Finance Tracker - ADWSO</h1>
    <button onclick="login()">Sign in with Microsoft</button>
    <p id="status">Loading...</p>

    <script>
        let msalInstance = null;

        function initMSAL() {
            if (window.msal) {
                msalInstance = new window.msal.PublicClientApplication({
                    auth: {
                        clientId: "8655d232-bda2-450d-82b1-21db106ed460",
                        authority: "https://login.microsoftonline.com/0d5287ec-27fd-45a5-b692-1adffe46d088",
                        redirectUri: window.location.href
                    }
                });
                document.getElementById('status').textContent = "Ready. Click Sign in.";
            } else {
                setTimeout(initMSAL, 500); // retry
            }
        }

        async function login() {
            if (!msalInstance) return alert("MSAL not ready yet. Refresh page.");
            
            try {
                const response = await msalInstance.loginPopup({
                    scopes: ["User.Read", "Sites.Read.All"]
                });
                alert("Login successful! Access Token acquired.");
                console.log("Token:", response.accessToken);
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        window.onload = initMSAL;
    </script>
</body>
</html>
