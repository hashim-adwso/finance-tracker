<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - ADWSO</title>
    <script src="https://unpkg.com/@azure/msal-browser@3/dist/msal-browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI'; text-align: center; padding: 50px; background: #f0f0f0; }
        button { padding: 15px 40px; font-size: 18px; margin: 20px; }
    </style>
</head>
<body>
    <h1>Finance Tracker - ADWSO</h1>
    <button onclick="login()">Sign in with Microsoft</button>
    <p id="status"></p>

    <script>
        let msalInstance;

        async function init() {
            msalInstance = new msal.PublicClientApplication({
                auth: {
                    clientId: "8655d232-bda2-450d-82b1-21db106ed460",
                    authority: "https://login.microsoftonline.com/0d5287ec-27fd-45a5-b692-1adffe46d088",
                    redirectUri: "https://hashim-adwso.github.io/finance-tracker"
                }
            });
            document.getElementById('status').innerHTML = "Ready. Click Sign in.";
        }

        async function login() {
            try {
                const response = await msalInstance.loginPopup({
                    scopes: ["User.Read", "Sites.Read.All", "Sites.ReadWrite.All"]
                });
                console.log("Token acquired", response.accessToken);
                document.getElementById('status').innerHTML = "Login successful! Token ready.";
                alert("Login successful!");
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerHTML = "Login failed: " + error.message;
            }
        }

        // Initialize when page loads
        window.onload = init;
    </script>
</body>
</html>
