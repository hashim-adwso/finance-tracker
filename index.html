<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - ADWSO</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@azure/msal-browser@3/dist/msal-browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        #root { padding: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const CONFIG = {
            auth: {
                clientId: "8655d232-bda2-450d-82b1-21db106ed460",
                authority: "https://login.microsoftonline.com/0d5287ec-27fd-45a5-b692-1adffe46d088",
                redirectUri: "https://hashim-adwso.github.io/finance-tracker"
            },
            sharePoint: {
                siteUrl: "https://adwso.sharepoint.com/sites/tcsop"
            }
        };

        // Simple App Component
        function App() {
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [user, setUser] = React.useState(null);

            const login = async () => {
                alert("Login flow will be implemented next. For now, clicking OK simulates successful login.");
                setIsLoggedIn(true);
                setUser({ name: "Hashim Ali Shah", email: "hashim@adwso.org", role: "Controller" });
            };

            if (!isLoggedIn) {
                return React.createElement('div', { style: { textAlign: 'center', marginTop: '100px' } },
                    React.createElement('h1', null, 'Finance Tracker - ADWSO'),
                    React.createElement('p', null, 'Welcome to the Finance Documentation Management System'),
                    React.createElement('button', {
                        onClick: login,
                        style: { padding: '15px 30px', fontSize: '18px', background: '#0078d4', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer' }
                    }, 'Sign in with Microsoft')
                );
            }

            return React.createElement('div', null,
                React.createElement('h1', null, `Welcome, ${user.name}`),
                React.createElement('p', null, `Role: ${user.role}`),
                React.createElement('p', null, '✅ App is now working! We will add Dashboard, Transactions, etc. next.')
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
